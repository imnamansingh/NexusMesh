syntax = "proto3";

package mesh;


enum Status {
    SUCCESS = 0;
    FAILED = 1;
    CONGESTED = 2;
    OUT_OF_RANGE = 3;
}




message WifiNode {
    int64 id = 1;
    double lat = 2;
    double lon = 3;
    int64 total_bandwidth = 4;
    int64 available_bandwidth = 5;
    bool is_gateway = 6;
    int32 latency_ms = 7;
}

message NodeBatch {
    repeated WifiNode nodes = 1;
}

message InitialRebootResponse {
    Status status = 1;
    string status_message = 2;
}


message User {
    int64 id = 1;
    double lat = 2;
    double lon = 3;
    int64 required_bandwidth = 4;
    int32 max_latency = 5;
}

message PathResponse {
    Status status = 1;
    string status_message = 2;
    repeated int64 path_list = 3;
    int64 gateway_id = 4;
    int32 no_of_hops = 5;
}

message AddNode {

    WifiNode node = 1;
    
}

message AddNodeResponse {
    Status status = 1;
    string status_message = 2;
    repeated int64 adjacency_list = 3;

}

message RemoveNode {
    int64 id = 1;

}

message RemoveNodeResponse {
    Status status = 1;
    string status_message = 2;
    int64 id = 3;
}

message RemoveUser {
    int64 id = 1;
    int64 bandwidth_occupied = 2;
    repeated int64 path_occupied = 3;

}

message RemoveUserResponse {
    Status status = 1;
    string status_message = 2;
    int64 id = 3;

}


service MeshService {
    rpc InitialReboot(NodeBatch) returns (InitialRebootResponse);
    rpc GetShortestPath(User) returns (PathResponse);
    rpc AddNodeMethod(AddNode) returns (AddNodeResponse);
    rpc RemoveNodeMethod(RemoveNode) returns (RemoveNodeResponse);
    rpc RemoveUserMethod(RemoveUser) returns (RemoveUserResponse);
}