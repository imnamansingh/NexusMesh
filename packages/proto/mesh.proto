syntax = "proto3";

package mesh;


enum Status {
    SUCCESS = 0;
    FAILED = 1;
    CONGESTED = 2;
    OUT_OF_RANGE = 3;
}




message WifiNode {
    int64 id = 1;
    double lat = 2;
    double lon = 3;
    int64 current_load = 4;
    int64 total_bandwidth = 5;
    int64 available_bandwidth = 6;
    bool is_gateway = 7;
    int32 latency_ms = 8;
}

message NodeBatch {
    repeated WifiNode nodes = 1;
}

message InitialRebootResponse {
    Status status = 1;
    string status_message = 2;
}


message User {
    int64 id = 1;
    double lat = 2;
    double lon = 3;
    int64 required_bandwidth = 4;
    int32 max_latency = 5;
}

message PathResponse {
    Status status = 1;
    string status_message = 2;
    string session_id = 3;
    repeated int64 path_list = 4;
    string gateway_ip = 5;
    int32 estimated_latency = 6;
    int64 guaranteed_bandwidth = 7;
    int32 no_of_hops = 8;
}

message AddNode {

    double lat = 1;
    double lon = 2;
    int64 total_bandwidth = 3;
    bool is_gateway = 4;
    int32 latency_ms = 5;
    
}

message AddNodeResponse {
    Status status = 1;
    string status_message = 2;
    int64 id = 3;
    repeated int64 adjacency_list = 4;

}

message RemoveNode {
    int64 id = 1;

}

message RemoveNodeResponse {
    Status status = 1;
    string status_message = 2;
    int64 id = 3;
}

message RemoveUser {
    int64 id = 1;
    string session_id = 2;

}

message RemoveUserResponse {
    Status status = 1;
    string status_message = 2;
    int64 id = 3;
    string session_id = 4;

}


service MeshService {
    rpc InitialReboot(NodeBatch) returns (InitialRebootResponse);
    rpc GetShortestPath(User) returns (PathResponse);
    rpc AddNode(AddNode) returns (AddNodeResponse);
    rpc RemoveNode(RemoveNode) returns (RemoveNodeResponse);
    rpc RemoveUser(RemoveUser) returns (RemoveUserResponse);
}